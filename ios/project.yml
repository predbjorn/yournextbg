name: yournextbg
options:
  bundleIdPrefix: com.yournextbg
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CLANG_ENABLE_MODULES: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"

targets:
  yournextbg:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: yournextbg
    info:
      path: yournextbg/Info.plist
      properties:
        CFBundleDisplayName: yournextbg
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        SENTRY_DSN: $(SENTRY_DSN)
        POSTHOG_API_KEY: $(POSTHOG_API_KEY)
        POSTHOG_HOST: $(POSTHOG_HOST)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yournextbg.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WEPFSXK95X
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-D DEBUG"
    configFiles:
      Debug: yournextbg.xcconfig
      Release: yournextbg.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Nuke
      - package: Nuke
        product: NukeUI
    entitlements:
      path: yournextbg/yournextbg.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.associated-domains:
          - applinks:yournextbg.com
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint >/dev/null; then
            swiftlint --quiet --config "${SRCROOT}/.swiftlint.yml"
          else
            echo "warning: SwiftLint not installed (brew install swiftlint to enable)."
          fi
        basedOnDependencyAnalysis: false

  yournextbgTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: yournextbgTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yournextbg.app.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/yournextbg.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/yournextbg
    dependencies:
      - target: yournextbg

schemes:
  yournextbg:
    build:
      targets:
        yournextbg: all
        yournextbgTests: [test]
    test:
      commandLineArguments:
        "-AppleLocale en_US": true
      targets:
        - yournextbgTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
