name: android-ci

on:
  pull_request:
    paths:
      - "android/**"
      - "contract/**"
      - ".github/workflows/android-ci.yml"
  push:
    branches: [main]
    paths:
      - "android/**"
      - "contract/**"
      - ".github/workflows/android-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle/libs.versions.toml', 'android/**/build.gradle*', 'android/settings.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Write CI local.properties
        # The build tolerates empty values (warns at Gradle config time). Real
        # values come from repo secrets when present; missing secrets become
        # empty strings, so CI still produces a debug APK that boots into the
        # SetupRequiredScreen rather than crashing.
        run: |
          cat > android/local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          SUPABASE_URL=${{ vars.SUPABASE_URL || 'https://gkickjaihbgapowsqwhx.supabase.co' }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST=https://us.i.posthog.com
          GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          EOF

      - name: Gradle wrapper sanity check
        working-directory: android
        run: ./gradlew --version

      - name: Lint
        working-directory: android
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            android/app/build/reports/tests/
            android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

# Signed release AAB + Play Store upload is intentionally NOT in this
# workflow. That requires the upload keystore (KEYSTORE_BASE64 +
# KEYSTORE_PASSWORD + KEY_ALIAS + KEY_PASSWORD secrets) plus a Play
# service-account JSON for fastlane supply, and lives in a separate
# `android-release.yml` workflow added once the Play Console account
# is back. See docs/plans/2026-05-23-04-android-compose.md (deferred
# tasks at the end).
